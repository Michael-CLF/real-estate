<section
  class="state-explorer"
  aria-labelledby="state-explorer-title"
>
  <div class="state-explorer__header">
      <h2 class="state-explorer__title">
            Find a home in every state
        </h2>
  </div>

  <div class="state-explorer__panel">
    <div class="state-explorer__grid">
      @for (state of states; track state.abbreviation) {
        <button
          class="state-card"
          [class.state-card--active]="state.isActive"
          [disabled]="!state.isActive"
          [attr.aria-label]="
            state.isActive
              ? 'Browse listings in ' + state.name
              : state.name + ' coming soon'
          "
          type="button"
          (click)="selectState(state)"
        >
          <span class="state-card__abbreviation">
            {{ state.abbreviation }}
          </span>

          <span class="state-card__content">
            <span class="state-card__name">
              {{ state.name }}
            </span>

            <span class="state-card__status">
              {{ state.isActive ? 'Browse listings' : 'Coming soon' }}
            </span>
          </span>

         <span class="state-card__flag-wrapper">
  <img
    class="state-card__flag"
    [alt]="state.name + ' state flag'"
    [src]="
      '/assets/images/state-flags/' +
      state.abbreviation.toLowerCase() +
      '.svg'
    "
  />
</span>
        </button>
      }
    </div>
  </div>
</section>
